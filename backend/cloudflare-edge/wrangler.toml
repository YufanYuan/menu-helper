name = "menu-helper-openrouter-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-05"
workers_dev = true

[vars]
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"

[[analytics_engine_datasets]]
binding = "USAGE_DATASET"
dataset = "menu_translate_analytics"

[[durable_objects.bindings]]
name = "MENU_ROOM_OBJECT"
class_name = "MenuRoomObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MenuRoomObject"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
