name: Containers

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push ${{ matrix.title }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: CN backend
            image: cn-backend
            context: .
            file: backend/cn-backend/Dockerfile
          - title: frontend blog
            image: frontend-blog
            context: frontend/frontend
            file: frontend/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          echo "name=${REGISTRY}/${owner}/${repo}-${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  pull-on-self-hosted:
    name: Pull images on self-hosted runner
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Set image names
        id: images
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          tag="sha-${GITHUB_SHA}"
          {
            echo "cn_backend=${REGISTRY}/${owner}/${repo}-cn-backend:${tag}"
            echo "frontend_blog=${REGISTRY}/${owner}/${repo}-frontend-blog:${tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull CN backend image
        run: docker pull "${{ steps.images.outputs.cn_backend }}"

      - name: Pull frontend blog image
        run: docker pull "${{ steps.images.outputs.frontend_blog }}"
