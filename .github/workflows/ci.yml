name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node:
    name: Node workspaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @menu-helper/cloudflare-edge typecheck
      - run: pnpm --filter @menu-helper/frontend build

  python:
    name: Python backends
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages
      - run: uv run --package menu-helper-cn-backend python -m compileall backend/cn-backend/src
